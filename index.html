<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NVLL — Underground Streetwear</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000000;
      --text: #ffffff;
      --glow: rgba(255, 255, 255, 0.8);
      --neon: #8b5cf6;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      overflow-x: hidden;
      cursor: none;
      letter-spacing: 0.05em;
    }

    h1, h2,.logo { font-family: 'Orbitron', sans-serif; letter-spacing: 0.15em; }

    /* CUSTOM CURSOR */
   .cursor {
      position: fixed;
      width: 20px;
      height: 20px;
      border: 1px solid var(--glow);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: width 0.2s, height 0.2s;
      z-index: 9999;
      mix-blend-mode: difference;
    }
   .cursor.hover { width: 40px; height: 40px; background: rgba(255,255,255,0.1); }

    /* GLOBAL OVERLAYS */
   .grain,.vignette { position: fixed; inset: 0; pointer-events: none; z-index: 9998; }
   .grain {
      opacity: 0.06;
      background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300"><filter id="n"><feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23n)" opacity="0.5"/></svg>');
      animation: grainShift 0.5s steps(3) infinite;
    }
   .vignette { box-shadow: inset 0 0 200px rgba(0,0,0,0.9); }
    @keyframes grainShift { 0%,100% { transform: translate(0,0); } 33% { transform: translate(-1%,1%); } 66% { transform: translate(1%,-1%); } }

    /* STARFIELD BACKGROUND */
    #starfield {
      position: fixed;
      inset: 0;
      z-index: 0;
      transition: transform 0.6s var(--ease);
    }

    /* LOADING SCREEN */
    #loader {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      transition: opacity 1s var(--ease), visibility 1s;
    }
    #loader.hide { opacity: 0; visibility: hidden; }
   .loader-logo {
      font-size: 2rem;
      animation: logoPulse 2s var(--ease) infinite;
      text-shadow: 0 0 20px var(--glow);
    }
    @keyframes logoPulse { 0%,100% { opacity: 0.4; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } }

    /* VIEWS SYSTEM */
   .view {
      position: fixed;
      inset: 0;
      opacity: 0;
      visibility: hidden;
      transform: scale(1.1);
      filter: blur(20px);
      transition: all 0.8s var(--ease);
      overflow-y: auto;
      z-index: 1;
    }
   .view.active {
      opacity: 1;
      visibility: visible;
      transform: scale(1);
      filter: blur(0);
    }

    /* LANDING VIEW */
    #landing {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
   .intro-logo {
      font-size: clamp(2rem, 8vw, 5rem);
      font-weight: 800;
      margin-bottom: 1rem;
      text-shadow: 0 0 30px var(--glow);
      animation: flicker 4s infinite alternate;
    }
    @keyframes flicker {
      0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; text-shadow: 0 0 30px var(--glow); }
      20%, 24%, 55% { opacity: 0.4; text-shadow: none; }
    }
   .clock {
      font-family: 'Orbitron', monospace;
      font-size: 1.2rem;
      margin-bottom: 4rem;
      opacity: 0.7;
      letter-spacing: 0.3em;
    }
   .menu {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      margin-bottom: 4rem;
    }
   .menu-item {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.5rem;
      font-weight: 600;
      background: none;
      border: none;
      color: var(--text);
      cursor: none;
      position: relative;
      transition: all 0.3s var(--ease);
      letter-spacing: 0.2em;
    }
   .menu-item:hover {
      text-shadow: 0 0 15px var(--glow);
      transform: scale(1.1);
      animation: glitch 0.3s;
    }
    @keyframes glitch {
      0% { transform: translate(0) scale(1.1); }
      20% { transform: translate(-2px, 2px) scale(1.1); }
      40% { transform: translate(-2px, -2px) scale(1.1); }
      60% { transform: translate(2px, 2px) scale(1.1); }
      80% { transform: translate(2px, -2px) scale(1.1); }
      100% { transform: translate(0) scale(1.1); }
    }
   .socials {
      display: flex;
      gap: 2rem;
    }
   .social {
      color: var(--text);
      text-decoration: none;
      opacity: 0.6;
      transition: all 0.3s var(--ease);
      font-size: 0.9rem;
    }
   .social:hover {
      opacity: 1;
      text-shadow: 0 0 10px var(--glow);
      transform: translateY(-3px);
    }

    /* SHOP VIEW */
    #shop { padding-top: 80px; }
   .shop-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      background-size: cover;
      background-position: center;
      filter: blur(8px) brightness(0.3);
    }
   .shop-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.9) 100%);
    }
   .topbar {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2rem;
      z-index: 100;
      backdrop-filter: blur(10px);
      background: rgba(0,0,0,0.5);
    }
   .logo {
      font-weight: 800;
      font-size: 1.5rem;
      text-shadow: 0 0 15px var(--glow);
    }
   .topbar-right { display: flex; gap: 1.5rem; align-items: center; }
   .icon-btn {
      background: none;
      border: none;
      color: var(--text);
      font-size: 1.2rem;
      cursor: none;
      position: relative;
    }
   .cart-count {
      position: absolute;
      top: -8px;
      right: -8px;
      background: var(--neon);
      color: var(--bg);
      font-size: 0.7rem;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
    }
   .categories {
      display: flex;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
      font-family: 'Orbitron', sans-serif;
    }
   .cat-btn {
      background: none;
      border: none;
      color: var(--text);
      opacity: 0.5;
      cursor: none;
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      transition: all 0.3s var(--ease);
    }
   .cat-btn.active,.cat-btn:hover {
      opacity: 1;
      text-shadow: 0 0 10px var(--glow);
    }
   .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
      padding: 0 1.5rem 4rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    @media (min-width: 768px) {.grid { grid-template-columns: repeat(3, 1fr); } }
   .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      overflow: hidden;
      cursor: none;
      transition: all 0.4s var(--ease);
      position: relative;
    }
   .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 12px;
      padding: 1px;
      background: linear-gradient(45deg, transparent, var(--glow), transparent);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity 0.4s var(--ease);
    }
   .card:hover::before { opacity: 0.6; }
   .card:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 20px 40px rgba(139, 92, 246, 0.2);
    }
   .card-img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      transition: transform 0.6s var(--ease);
      filter: drop-shadow(0 0 20px rgba(255,255,255,0.1));
    }
   .card:hover.card-img { transform: scale(1.05) translateY(-5px); }
   .card-info {
      padding: 1rem;
      text-align: center;
    }
   .card-name {
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }
   .card-price { opacity: 0.7; font-size: 0.9rem; }

    /* PRODUCT VIEW */
    #product {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6rem 2rem 2rem;
      text-align: center;
    }
   .product-img-wrap {
      position: relative;
      margin-bottom: 3rem;
      animation: float 6s ease-in-out infinite;
    }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
   .product-glow {
      position: absolute;
      inset: -50%;
      background: radial-gradient(circle, rgba(139,92,246,0.3) 0%, transparent 70%);
      filter: blur(40px);
      z-index: -1;
    }
   .product-img {
      width: 300px;
      max-width: 80vw;
      filter: drop-shadow(0 0 40px rgba(255,255,255,0.2));
    }
   .product-name {
      font-size: 2rem;
      font-weight: 800;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
   .product-price {
      font-size: 1.3rem;
      margin-bottom: 1rem;
      opacity: 0.8;
    }
   .product-note {
      font-size: 0.75rem;
      opacity: 0.5;
      margin-bottom: 2rem;
      letter-spacing: 0.1em;
    }
   .qty {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 2rem;
      font-family: 'Orbitron', sans-serif;
    }
   .qty-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.3);
      color: var(--text);
      width: 40px;
      height: 40px;
      cursor: none;
      transition: all 0.3s var(--ease);
    }
   .qty-btn:hover {
      border-color: var(--glow);
      box-shadow: 0 0 15px var(--glow);
    }
   .add-cart {
      background: none;
      border: 1px solid var(--neon);
      color: var(--text);
      padding: 1rem 3rem;
      font-family: 'Orbitron', sans-serif;
      font-weight: 600;
      letter-spacing: 0.2em;
      cursor: none;
      position: relative;
      overflow: hidden;
      transition: all 0.3s var(--ease);
      animation: btnPulse 2s infinite;
    }
    @keyframes btnPulse { 0%,100% { box-shadow: 0 0 10px var(--neon); } 50% { box-shadow: 0 0 25px var(--neon); } }
   .add-cart:hover {
      background: var(--neon);
      color: var(--bg);
      box-shadow: 0 0 40px var(--neon);
      transform: scale(1.05);
    }
   .product-nav {
      position: fixed;
      bottom: 2rem;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 2rem;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
    }
   .nav-btn {
      background: none;
      border: none;
      color: var(--text);
      opacity: 0.5;
      cursor: none;
      transition: all 0.3s var(--ease);
    }
   .nav-btn:hover {
      opacity: 1;
      text-shadow: 0 0 10px var(--glow);
    }

    /* RIPPLE EFFECT */
   .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.4);
      transform: scale(0);
      animation: ripple 0.6s var(--ease);
      pointer-events: none;
    }
    @keyframes ripple { to { transform: scale(4); opacity: 0; } }
  </style>
</head>
<body>
  <canvas id="starfield"></canvas>
  <div class="grain"></div>
  <div class="vignette"></div>
  <div class="cursor"></div>

  <div id="loader">
    <div class="loader-logo">NVLL</div>
  </div>

  <!-- LANDING VIEW -->
  <section id="landing" class="view active">
    <div class="intro-logo">NVLL</div>
    <div class="clock" id="clock">00:00:00</div>
    <div class="menu">
      <button class="menu-item" data-view="landing">HOME</button>
      <button class="menu-item" data-view="shop">SHOP ALL</button>
      <button class="menu-item" onclick="alert('Contact: contact@nvll.xyz')">CONTACT</button>
    </div>
    <div class="socials">
      <a href="#" class="social">INSTAGRAM</a>
      <a href="#" class="social">TIKTOK</a>
      <a href="#" class="social">YOUTUBE</a>
    </div>
  </section>

  <!-- SHOP VIEW -->
  <section id="shop" class="view">
    <div class="shop-bg" id="shopBg"></div>
    <div class="topbar">
      <button class="icon-btn" data-view="landing">☰</button>
      <div class="logo">NVLL</div>
      <div class="topbar-right">
        <button class="icon-btn">⌕</button>
        <button class="icon-btn">
          🛒<span class="cart-count" id="cartCount">0</span>
        </button>
      </div>
    <div class="categories">
      <button class="cat-btn" data-cat="jacket">JACKET</button>
      <button class="cat-btn active" data-cat="all">SHOP ALL</button>
      <button class="cat-btn" data-cat="tracksuit">TRACKSUIT</button>
    </div>
    <div class="grid" id="grid"></div>
  </section>

  <!-- PRODUCT VIEW -->
  <section id="product" class="view">
    <div class="product-img-wrap">
      <div class="product-glow"></div>
      <img class="product-img" id="productImg" src="" alt="">
    </div>
    <h1 class="product-name" id="productName"></h1>
    <div class="product-price" id="productPrice"></div>
    <div class="product-note">Shipping calculated at checkout</div>
    <div class="qty">
      <button class="qty-btn" id="qtyDown">-</button>
      <span id="qtyVal">1</span>
      <button class="qty-btn" id="qtyUp">+</button>
    </div>
    <button class="add-cart" id="addCart">ADD TO CART</button>
    <div class="product-nav">
      <button class="nav-btn" id="prevBtn">< PREVIOUS</button>
      <button class="nav-btn" id="nextBtn">NEXT ></button>
    </div>
  </section>

  <script>
    // CONFIG
    const productsBackground = "PUT-YOUR-IMAGE-LINK-HERE";
    const PRODUCTS = [
      { id: 1, name: "VOID JACKET", price: 4500, cat: "jacket", img: "https://images.unsplash.com/photo-1551028719-00167b16eac5?w=800" },
      { id: 2, name: "NEON TRACKSUIT", price: 3200, cat: "tracksuit", img: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=800" },
      { id: 3, name: "GHOST HOODIE", price: 2800, cat: "jacket", img: "https://images.unsplash.com/photo-1578681994506-b8f463449011?w=800" },
      { id: 4, name: "SHADOW PANTS", price: 2100, cat: "tracksuit", img: "https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?w=800" },
    ];

    // STATE
    let currentView = 'landing';
    let currentProduct = 0;
    let qty = 1;
    let cart = JSON.parse(localStorage.getItem('nvll_cart') || '[]');
    let currentCat = 'all';

    // ELEMENTS
    const views = document.querySelectorAll('.view');
    const cursor = document.querySelector('.cursor');
    const cartCount = document.getElementById('cartCount');
    const shopBg = document.getElementById('shopBg');

    // INIT
    window.addEventListener('load', () => {
      setTimeout(() => document.getElementById('loader').classList.add('hide'), 1500);
      updateClock();
      setInterval(updateClock, 1000);
      initStarfield();
      updateCartCount();
      renderProducts();
      if (productsBackground!== "PUT-YOUR-IMAGE-LINK-HERE") {
        shopBg.style.backgroundImage = `url(${productsBackground})`;
      }
    });

    // CURSOR
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';

      // Parallax on starfield
      const x = (e.clientX / window.innerWidth - 0.5) * 20;
      const y = (e.clientY / window.innerHeight - 0.5) * 20;
      document.getElementById('starfield').style.transform = `translate(${x}px, ${y}px)`;
    });

    document.querySelectorAll('button, a,.card').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
    });

    // RIPPLE
    document.addEventListener('click', e => {
      if (e.target.closest('button')) {
        const btn = e.target.closest('button');
        const rect = btn.getBoundingClientRect();
        const ripple = document.createElement('span');
        ripple.className = 'ripple';
        ripple.style.left = e.clientX - rect.left + 'px';
        ripple.style.top = e.clientY - rect.top + 'px';
        btn.appendChild(ripple);
        setTimeout(() => ripple.remove(), 600);
      }
    });

    // CLOCK
    function updateClock() {
      const now = new Date();
      const time = [now.getHours(), now.getMinutes(), now.getSeconds()]
       .map(n => String(n).padStart(2, '0')).join(':');
      document.getElementById('clock').textContent = time;
    }

    // VIEW SWITCHING
    document.querySelectorAll('[data-view]').forEach(btn => {
      btn.addEventListener('click', () => switchView(btn.dataset.view));
    });

    function switchView(view) {
      views.forEach(v => v.classList.remove('active'));
      document.getElementById(view).classList.add('active');
      currentView = view;
      window.scrollTo(0, 0);
    }

    // STARFIELD
    function initStarfield() {
      const canvas = document.getElementById('starfield');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const stars = Array.from({ length: 200 }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        z: Math.random() * 1000,
        size: Math.random() * 2
      }));

      function draw() {
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#fff';

        stars.forEach(s => {
          s.z -= 2;
          if (s.z <= 0) s.z = 1000;
          const x = (s.x - canvas.width / 2) * (1000 / s.z) + canvas.width / 2;
          const y = (s.y - canvas.height / 2) * (1000 / s.z) + canvas.height / 2;
          const size = (1 - s.z / 1000) * s.size * 2;
          ctx.globalAlpha = 1 - s.z / 1000;
          ctx.fillRect(x, y, size, size);
        });

        requestAnimationFrame(draw);
      }
      draw();

      window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      });
    }

    // PRODUCTS
    function renderProducts() {
      const grid = document.getElementById('grid');
      const filtered = currentCat === 'all'? PRODUCTS : PRODUCTS.filter(p => p.cat === currentCat);

      grid.innerHTML = filtered.map((p, i) => `
        <div class="card" data-id="${p.id}" data-index="${i}">
          <img class="card-img" src="${p.img}" loading="lazy" alt="${p.name}">
          <div class="card-info">
            <div class="card-name">${p.name}</div>
            <div class="card-price">${p.price} EGP</div>
          </div>
        </div>
      `).join('');

      document.querySelectorAll('.card').forEach(card => {
        card.addEventListener('click', () => {
          const id = Number(card.dataset.id);
          currentProduct = PRODUCTS.findIndex(p => p.id === id);
          showProduct();
        });
      });
    }

    // CATEGORIES
    document.querySelectorAll('.cat-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCat = btn.dataset.cat;
        renderProducts();
      });
    });

    // PRODUCT DETAIL
    function showProduct() {
      const p = PRODUCTS[currentProduct];
      document.getElementById('productImg').src = p.img;
      document.getElementById('productName').textContent = p.name;
      document.getElementById('productPrice').textContent = `${p.price} EGP`;
      qty = 1;
      document.getElementById('qtyVal').textContent = qty;
      switchView('product');
    }

    document.getElementById('qtyUp').onclick = () => {
      qty++;
      document.getElementById('qtyVal').textContent = qty;
    };
    document.getElementById('qtyDown').onclick = () => {
      if (qty > 1) qty--;
      document.getElementById('qtyVal').textContent = qty;
    };

    document.getElementById('prevBtn').onclick = () => {
      currentProduct = (currentProduct - 1 + PRODUCTS.length) % PRODUCTS.length;
      showProduct();
    };
    document.getElementById('nextBtn').onclick = () => {
      currentProduct = (currentProduct + 1) % PRODUCTS.length;
      showProduct();
    };

    // CART
    document.getElementById('addCart').onclick = () => {
      const p = PRODUCTS[currentProduct];
      const existing = cart.find(i => i.id === p.id);
      if (existing) existing.qty += qty;
      else cart.push({...p, qty });
      localStorage.setItem('nvll_cart', JSON.stringify(cart));
      updateCartCount();

      // Visual feedback
      const btn = document.getElementById('addCart');
      btn.textContent = 'ADDED';
      setTimeout(() => btn.textContent = 'ADD TO CART', 1000);
    };

    function updateCartCount() {
      const count = cart.reduce((sum, i) => sum + i.qty, 0);
      cartCount.textContent = count;
      cartCount.style.display = count? 'flex' : 'none';
    }
  </script>
</body>
      </html>
